name: Build Runner

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# The release job creates a GitHub Release, which needs write access to repo
# contents. Without this the default GITHUB_TOKEN is read-only and the release
# API returns 403 "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build artifacts only. Publishing is done by the dedicated `release` job
      # below — passing --publish never stops electron-builder from trying to
      # create the GitHub release itself (which failed with 403 before).
      - name: Build Electron app
        run: npm run build -- --publish never

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmergentFlow-Runner-Windows
          path: dist/*.exe

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmergentFlow-Runner-macOS
          path: dist/*.dmg

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmergentFlow-Runner-Linux
          path: dist/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            EmergentFlow-Runner-Windows/*.exe
            EmergentFlow-Runner-macOS/*.dmg
            EmergentFlow-Runner-Linux/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
